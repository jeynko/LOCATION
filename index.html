<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إرسال الموقع</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#fff;
width:90%;
max-width:400px;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.15);
text-align:center;
}

h2{
color:#0A84FF;
margin-bottom:15px;
}

p{
line-height:1.8;
font-size:17px;
}

button{
margin-top:20px;
width:100%;
padding:16px;
font-size:20px;
background:#0A84FF;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0066cc;
}
</style>

</head>

<body>

<div class="box">

<h2>📍 إرسال موقعك</h2>

<p>

اضغط على الزر بالأسفل.<br><br>

1️⃣ اضغط <b>سماح</b> عند طلب الوصول إلى موقعك.<br><br>

2️⃣ سيتم فتح تطبيق الرسائل تلقائياً.<br><br>

3️⃣ اضغط <b>إرسال</b> فقط.

</p>

<button onclick="sendLocation()">
📍 إرسال موقعي
</button>

</div>

<script>

function sendLocation(){

if(!navigator.geolocation){

alert("هذا الهاتف لا يدعم تحديد الموقع.");

return;

}

navigator.geolocation.getCurrentPosition(

function(position){

const lat=position.coords.latitude;

const lon=position.coords.longitude;

const link="https://maps.google.com/?q="+lat+","+lon;

const text=
"السلام عليكم، هذا هو موقعي الحالي:\n\n"+link;

window.location.href=
"sms:0556261246?body="+encodeURIComponent(text);

},

function(){

alert("يرجى السماح بالوصول إلى الموقع.");

}

);

}

</script>

</body>

</html>
