<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إرسال الموقع</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.2);
max-width:350px;
}

button{
background:#25D366;
color:white;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="box">
<h2>📍 إرسال الموقع</h2>

<p>اضغط على الزر ثم وافق على مشاركة موقعك.</p>

<button onclick="sendLocation()">إرسال موقعي</button>
</div>

<script>

function sendLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

let lat=position.coords.latitude;
let lon=position.coords.longitude;

let phone="213556261246";

let text=encodeURIComponent(
"مرحبًا، هذا موقعي: https://maps.google.com/?q="+lat+","+lon
);

window.location.href="https://wa.me/"+phone+"?text="+text;

},function(){
alert("تعذر الحصول على الموقع.");
});

}else{
alert("هذا المتصفح لا يدعم تحديد الموقع.");
}

}

</script>

</body>
</html>
