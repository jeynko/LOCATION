<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إرسال الموقع</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
}

.container{
    max-width:420px;
    margin:40px auto;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
    text-align:center;
}

h2{
    color:#007BFF;
}

p{
    line-height:1.8;
    font-size:17px;
}

button{
    width:100%;
    padding:16px;
    margin-top:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

#gpsBtn{
    background:#007BFF;
}

#sendBtn{
    background:#28A745;
}

#status{
    margin-top:15px;
    font-weight:bold;
    color:green;
}
</style>

</head>

<body>

<div class="container">

<h2>📍 مشاركة موقعك</h2>

<p>
<b>الخطوة الأولى</b><br>
اضغط على زر <b>تشغيل GPS</b> ثم اضغط <b>سماح</b> عندما يطلب الهاتف الإذن.
</p>

<button id="gpsBtn" onclick="startGPS()">
📡 تشغيل GPS
</button>

<div id="status"></div>

<hr style="margin:25px 0;">

<p>
<b>الخطوة الثانية</b><br>
بعد ظهور رسالة <b>تم تحديد موقعك بنجاح</b> اضغط على الزر التالي.
</p>

<button id="sendBtn" onclick="sendSMS()">
📩 إرسال موقعي عبر رسالة SMS
</button>

</div>

<script>

let lat="";
let lon="";

function startGPS(){

document.getElementById("status").innerHTML="⏳ جاري تحديد موقعك...";

navigator.geolocation.getCurrentPosition(

function(position){

lat=position.coords.latitude;
lon=position.coords.longitude;

document.getElementById("status").innerHTML="✅ تم تحديد موقعك بنجاح";

},

function(){

document.getElementById("status").innerHTML="❌ يرجى الضغط على (سماح) لتحديد موقعك.";

}

);

}

function sendSMS(){

if(lat==""){

alert("يرجى تشغيل GPS أولاً.");

return;

}

let message="السلام عليكم، هذا هو موقعي:\nhttps://maps.google.com/?q="+lat+","+lon;
  window.location.href="sms:0556261246?body="+encodeURIComponent(message);

}

</script>

</body>
</html>
